# Phospharr — self-hosted IPTV manager + viewer
#
#   docker compose up -d            →  http://localhost:7777
#
# Create your admin account in the UI on first run. Streaming + the HDHomeRun
# tuner are locked behind an auto-generated key — grab the tuner URL from
# Settings → Access & Tuner and paste it into Plex/Jellyfin.
#
# VPN (no Gluetun): Phospharr dials VPNs itself. In Settings → VPN TUNNELS, paste
# a WireGuard .conf (or an OpenVPN .ovpn), then per Source pick which VPN it uses —
# Source A → Japan, Source B → UK, etc. Phospharr runs OUTSIDE the tunnels and only
# routes the sources you choose, so one instance mixes VPN and non-VPN providers.
#
#   • WireGuard works out of the box — no extra privileges.
#   • OpenVPN needs a TUN device + NET_ADMIN — the SAME privileges Gluetun uses
#     (no SYS_ADMIN, no namespaces; it routes per source via policy routing). The
#     `cap_add`/`devices` below grant them, and are ONLY needed for OpenVPN —
#     delete them if you only use WireGuard.
# You can still point a Source at an EXTERNAL proxy (your own Gluetun, etc.) via
# Settings → VPN ENDPOINTS if you prefer to run the tunnel yourself.

services:
  phospharr:
    build: .
    # image: ghcr.io/<you>/phospharr:latest   # swap in once you publish an image
    container_name: phospharr
    restart: unless-stopped
    ports:
      - "${PHOSPHARR_PORT:-7777}:7777"
    volumes:
      - phospharr-data:/data            # SQLite DB + DVR recordings persist here
    environment:
      BASE_URL: ${BASE_URL:-}         # public URL for HDHR discovery; blank = request host
      PHOSPHARR_STREAM_KEY: ${PHOSPHARR_STREAM_KEY:-}   # pin the tuner/stream key; blank = auto-generated
      TZ: ${TZ:-UTC}
    # ── OpenVPN tunnels only (WireGuard needs neither) ──
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks: [phospharr]

networks:
  phospharr:
    name: phospharr

volumes:
  phospharr-data:
